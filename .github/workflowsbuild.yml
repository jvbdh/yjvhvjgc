name: Build APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Download project
      run: wget -O project.zip "https://github.com/jvbdh/yjvhvjgc/archive/refs/heads/main.zip"

    - name: Unzip project
      run: unzip project.zip

    - name: Enter project folder
      run: cd */

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Build APK
      run: |
        cd */
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: app/build/outputs/apk/debug/app-debug.apk
